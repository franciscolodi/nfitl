name: NFIT Auto Reservation

on:
  schedule:
    # Dispara antes de las 18:00 Chile (~17:39)
    - cron: '39 19 * * 0-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Esperar hasta las 18:01 Chile (21:01 UTC)
      - name: Esperar hasta las 18:01 Chile
        run: |
          echo "Hora actual UTC:"
          date -u

          TARGET_HOUR=20
          TARGET_MIN=1

          NOW_EPOCH=$(date +%s)
          TARGET_EPOCH=$(date -d "$(date -u +%Y-%m-%d) ${TARGET_HOUR}:${TARGET_MIN}:00 UTC" +%s)

          # Si ya pasó hoy, abortar (evita ejecuciones tardías tipo 18:30+)
          if [ $NOW_EPOCH -ge $TARGET_EPOCH ]; then
            echo "Ya pasó la hora objetivo. Abortando ejecución."
            exit 0
          fi

          WAIT_SECONDS=$((TARGET_EPOCH - NOW_EPOCH))

          echo "Esperando $WAIT_SECONDS segundos hasta las 18:01 Chile..."

          # Protección por si algo raro pasa
          if [ $WAIT_SECONDS -gt 4000 ]; then
            echo "Tiempo de espera demasiado largo. Abortando."
            exit 1
          fi

          sleep $WAIT_SECONDS

          echo "Hora después de esperar:"
          date -u

      # 3️⃣ Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4️⃣ Limpiar entorno pip
      - name: Limpiar entorno pip
        run: |
          pip uninstall -y selenium python-telegram-bot python-dotenv || true
          pip cache purge

      # 5️⃣ Instalar dependencias Python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.11.2 python-dotenv python-telegram-bot==13.15

      # 6️⃣ Instalar Google Chrome
      - name: Install Google Chrome
        run: |
          sudo apt update
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt -f install -y
        continue-on-error: true

      # 7️⃣ Ejecutar NFIT bot
      - name: Run NFIT bot
        env:
          NFIT_EMAIL: ${{ secrets.NFIT_EMAIL }}
          NFIT_PASS: ${{ secrets.NFIT_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Ejecutando bot en:"
          date -u
          python bot_nfit.py
